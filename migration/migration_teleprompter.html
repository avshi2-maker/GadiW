<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GadiW Migration Teleprompter v3</title>
<!--
  GadiW Migration Day Teleprompter v3
  Updated 28/04/2026: UX polish based on dress-rehearsal feedback.
  · NEW: Persistent column reference bar (always visible, eliminates counting)
  · FIX: Column count description (6 navy + 5 green + 1 grey = 12)
  · NEW: Pass landing cards now show which column this pass affects
  · NEW: "Row 1=header, Row 2=first data" hints throughout
  · NEW: Filename pattern shown explicitly in Pass 0 Step 1
  · NEW: Tab location reminder (BOTTOM of Excel) in Pass 0 Step 2
  · NEW: Pass dots have explanatory tooltips
  · STORAGE_KEY bumped to v3 to clear stale state
-->
<style>
  :root {
    --navy: #1F3A5F;
    --navy-deep: #0d2747;
    --navy-soft: #2E5085;
    --cream: #FFF8E7;
    --paper: #FDFBF5;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-faint: #888;
    --rule: #E8E0CF;
    --green: #2E7D32;
    --green-soft: #C8E6C9;
    --amber: #E65100;
    --amber-soft: #FFE0B2;
    --rose: #B71C1C;
    --rose-soft: #FFCDD2;
    --blue-soft: #E3F2FD;
    --purple-soft: #F3E5F5;
    --auto-blue: #1F3A5F;
    --human-green: #2E7D32;
    --script-grey: #757575;
    --shadow-soft: 0 8px 24px rgba(31, 58, 95, 0.12);
    --fs-tiny: 11px;
    --fs-small: 14px;
    --fs-body: 16px;
    --fs-action: 22px;
    --fs-large: 28px;
    --fs-huge: 36px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: linear-gradient(135deg, var(--paper) 0%, var(--cream) 100%);
    font-family: 'Heebo', 'Frank Ruhl Libre', 'Segoe UI', Tahoma, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 14px;
  }

  .app {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: white;
    border-radius: 14px;
    box-shadow: var(--shadow-soft);
    overflow: hidden;
    border: 1px solid var(--rule);
    min-height: 0;
  }

  .header {
    background: var(--navy);
    color: white;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .workflow-name {
    font-size: var(--fs-small);
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
  }

  .pause-badge {
    background: rgba(255,255,255,0.15);
    color: white;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: var(--fs-tiny);
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 6px;
  }
  .pause-badge.is-paused {
    display: inline-flex;
    background: var(--amber);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .pass-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .pass-title-he {
    font-size: var(--fs-large);
    font-weight: 700;
    line-height: 1.2;
  }

  .pass-counter {
    font-size: var(--fs-small);
    color: rgba(255,255,255,0.7);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green-soft), white);
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 8px rgba(255,255,255,0.4);
  }

  /* ============================================================
     COLUMN REFERENCE BAR — always visible above step body
     ============================================================ */
  .col-ref {
    background: white;
    border-bottom: 1px solid var(--rule);
    padding: 8px 14px;
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: flex-start;
    align-items: center;
    direction: ltr; /* English column letters flow LTR */
  }

  .col-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 7px;
    border-radius: 4px;
    font-size: var(--fs-tiny);
    font-weight: 600;
    line-height: 1.2;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .col-chip-letter {
    font-family: 'Consolas', monospace;
    font-weight: 700;
    color: white;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: var(--fs-tiny);
  }
  .col-chip-name {
    font-family: 'Heebo', sans-serif;
    direction: ltr;
  }

  /* Three category styles for column chips */
  .col-chip.cat-auto {
    background: rgba(31, 58, 95, 0.08);
    border-color: rgba(31, 58, 95, 0.2);
    color: var(--auto-blue);
  }
  .col-chip.cat-auto .col-chip-letter { background: var(--auto-blue); }

  .col-chip.cat-human {
    background: rgba(46, 125, 50, 0.1);
    border-color: rgba(46, 125, 50, 0.3);
    color: var(--human-green);
  }
  .col-chip.cat-human .col-chip-letter { background: var(--human-green); }

  .col-chip.cat-script {
    background: rgba(117, 117, 117, 0.1);
    border-color: rgba(117, 117, 117, 0.3);
    color: var(--script-grey);
  }
  .col-chip.cat-script .col-chip-letter { background: var(--script-grey); }

  /* Highlight active column for current pass */
  .col-chip.is-active {
    box-shadow: 0 0 0 2px var(--amber);
    transform: scale(1.05);
    background: var(--amber-soft) !important;
    border-color: var(--amber) !important;
    color: var(--ink) !important;
  }
  .col-chip.is-active .col-chip-letter { background: var(--amber) !important; }

  .step-body {
    flex: 1;
    padding: 18px 22px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--paper);
  }

  .step-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--rule);
  }

  .step-counter {
    font-size: var(--fs-small);
    font-weight: 600;
    color: var(--navy);
    font-variant-numeric: tabular-nums;
  }

  .step-tag {
    font-size: var(--fs-tiny);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-faint);
    font-weight: 500;
  }

  .step-action {
    font-size: var(--fs-action);
    line-height: 1.5;
    color: var(--ink);
    font-weight: 500;
  }

  .step-detail {
    font-size: var(--fs-body);
    line-height: 1.65;
    color: var(--ink-soft);
  }

  .substeps {
    background: white;
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 4px 0;
  }
  .substeps ol {
    list-style: none;
    counter-reset: substep;
    padding: 0;
    margin: 0;
  }
  .substeps li {
    counter-increment: substep;
    position: relative;
    padding-right: 38px;
    padding-left: 8px;
    padding-top: 6px;
    padding-bottom: 6px;
    font-size: var(--fs-body);
    line-height: 1.5;
    color: var(--ink);
  }
  .substeps li::before {
    content: counter(substep);
    position: absolute;
    right: 0;
    top: 6px;
    width: 26px;
    height: 26px;
    background: var(--navy);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--fs-tiny);
    font-weight: 700;
  }
  .substeps li + li {
    border-top: 1px dashed var(--rule);
    margin-top: 4px;
  }

  .literal {
    display: inline-block;
    background: var(--blue-soft);
    color: var(--navy-deep);
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 1em;
    border: 1px solid rgba(31, 58, 95, 0.15);
    cursor: pointer;
    transition: all 0.15s;
    user-select: all;
    margin: 0 2px;
  }
  .literal:hover {
    background: var(--navy);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(31, 58, 95, 0.3);
  }
  .literal.copied {
    background: var(--green);
    color: white;
  }

  .menu-he {
    display: inline-block;
    padding: 2px 8px;
    background: var(--purple-soft);
    border: 1px solid #ce93d8;
    border-radius: 4px;
    font-weight: 600;
    color: #4A148C;
    font-size: 0.95em;
    margin: 0 2px;
  }

  .menu-en {
    display: inline-block;
    padding: 1px 6px;
    background: white;
    border: 1px dashed var(--rule);
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    font-size: 0.85em;
    color: var(--ink-faint);
    direction: ltr;
    margin: 0 2px;
  }

  .kbd {
    display: inline-block;
    padding: 2px 8px;
    background: white;
    border: 1px solid var(--rule);
    border-bottom-width: 2px;
    border-radius: 5px;
    font-family: 'Consolas', monospace;
    font-size: 0.85em;
    color: var(--navy);
    font-weight: 600;
    margin: 0 1px;
  }

  /* Cell ref — like G2, H4, etc. */
  .cell {
    display: inline-block;
    background: var(--amber-soft);
    color: var(--ink);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    font-weight: 700;
    font-size: 1em;
    border: 1px solid var(--amber);
    margin: 0 2px;
  }

  .verify {
    background: var(--green-soft);
    border-right: 4px solid var(--green);
    border-radius: 6px;
    padding: 12px 14px;
    margin-top: 4px;
  }
  .verify-title {
    font-size: var(--fs-small);
    font-weight: 700;
    color: #1B5E20;
    margin-bottom: 6px;
  }
  .verify-body {
    font-size: var(--fs-small);
    line-height: 1.5;
    color: var(--ink);
  }

  .tip {
    background: var(--blue-soft);
    border-right: 4px solid #1976D2;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: var(--fs-small);
    color: var(--ink);
    line-height: 1.5;
    margin-top: 4px;
  }
  .warn {
    background: var(--amber-soft);
    border-right: 4px solid var(--amber);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: var(--fs-small);
    color: var(--ink);
    line-height: 1.5;
    margin-top: 4px;
  }
  .danger {
    background: var(--rose-soft);
    border-right: 4px solid var(--rose);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: var(--fs-small);
    color: var(--ink);
    line-height: 1.5;
    margin-top: 4px;
  }
  .tip strong, .warn strong, .verify strong, .danger strong { color: var(--navy-deep); }

  .landing {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-soft) 100%);
    color: white;
    padding: 18px 20px;
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .landing-emoji { font-size: 36px; margin-bottom: 6px; }
  .landing-title { font-size: var(--fs-large); font-weight: 700; margin-bottom: 6px; }
  .landing-body { font-size: var(--fs-body); line-height: 1.5; color: rgba(255,255,255,0.92); margin-bottom: 8px; }
  .landing-target {
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    font-size: var(--fs-small);
    color: white;
    border-right: 3px solid var(--amber);
  }

  .complete-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
    gap: 16px;
  }
  .complete-icon { font-size: 80px; line-height: 1; }
  .complete-title { font-size: 32px; font-weight: 700; color: var(--navy); }
  .complete-message { font-size: var(--fs-body); color: var(--ink-soft); line-height: 1.6; max-width: 360px; }

  .controls {
    background: white;
    padding: 14px 18px;
    border-top: 1px solid var(--rule);
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }

  button { font-family: inherit; cursor: pointer; border: none; transition: all 0.15s; font-weight: 600; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-back, .btn-pause {
    padding: 12px 14px;
    background: white;
    color: var(--navy);
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    font-size: var(--fs-small);
  }
  .btn-back:hover:not(:disabled), .btn-pause:hover:not(:disabled) {
    background: var(--paper);
    border-color: var(--navy);
  }
  .btn-pause.is-paused {
    background: var(--amber);
    color: white;
    border-color: var(--amber);
  }

  .btn-next {
    padding: 14px 24px;
    background: var(--navy);
    color: white;
    border-radius: 8px;
    font-size: var(--fs-action);
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(31, 58, 95, 0.3);
    grid-column: 4;
  }
  .btn-next:hover:not(:disabled) {
    background: var(--navy-deep);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(31, 58, 95, 0.4);
  }
  .btn-next.is-final {
    background: var(--green);
    box-shadow: 0 4px 14px rgba(46, 125, 50, 0.3);
  }
  .btn-next.is-final:hover { background: #1B5E20; }

  .footer {
    background: var(--paper);
    padding: 8px 18px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--fs-tiny);
    color: var(--ink-faint);
    flex-shrink: 0;
  }

  .pass-jump { display: flex; gap: 4px; }
  .jump-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--rule);
    color: var(--ink-soft);
    font-size: var(--fs-tiny);
    font-weight: 700;
    cursor: pointer;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .jump-dot:hover { background: var(--navy-soft); color: white; }
  .jump-dot.is-current {
    background: var(--navy);
    color: white;
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--navy-soft);
  }
  .jump-dot.is-done { background: var(--green); color: white; }

  .reset-btn {
    background: transparent;
    color: var(--ink-faint);
    border: none;
    cursor: pointer;
    font-size: var(--fs-tiny);
    padding: 4px 8px;
    border-radius: 4px;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .reset-btn:hover { color: var(--rose); }

  .pause-overlay {
    position: fixed;
    inset: 0;
    background: rgba(31, 58, 95, 0.96);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(8px);
    color: white;
  }
  .pause-overlay.is-visible { display: flex; }
  .pause-card { text-align: center; padding: 40px; max-width: 380px; }
  .pause-emoji { font-size: 72px; margin-bottom: 14px; }
  .pause-title { font-size: var(--fs-huge); font-weight: 700; margin-bottom: 8px; }
  .pause-subtitle { font-size: var(--fs-body); opacity: 0.85; margin-bottom: 6px; }
  .pause-timer {
    font-size: 48px;
    font-weight: 700;
    margin: 18px 0;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
  .pause-resume {
    background: white;
    color: var(--navy);
    padding: 16px 32px;
    border-radius: 10px;
    font-size: var(--fs-action);
    font-weight: 700;
    margin-top: 14px;
  }
  .pause-resume:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .en {
    font-size: var(--fs-tiny);
    color: var(--ink-faint);
    font-style: italic;
    direction: ltr;
    text-align: left;
    line-height: 1.5;
  }

  @media (max-height: 720px) {
    .step-body { padding: 14px 16px; gap: 10px; }
    .pass-title-he { font-size: 22px; }
    .step-action { font-size: 18px; }
    .controls { padding: 10px 14px; }
    .btn-next { padding: 12px 18px; font-size: 18px; }
    .landing { padding: 14px 16px; }
    .landing-emoji { font-size: 28px; }
    .landing-title { font-size: 22px; }
    .col-ref { padding: 6px 10px; }
    .col-chip { padding: 2px 5px; font-size: 10px; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <span class="workflow-name" id="workflow-name">GadiW Migration · Excel Filling · v3</span>
      <span class="pause-badge" id="pause-badge">⏸ הופסק זמנית</span>
    </div>
    <div class="pass-line">
      <div class="pass-title-he" id="pass-title">—</div>
      <div class="pass-counter" id="pass-counter">—</div>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
    </div>
  </div>

  <!-- Persistent column reference bar — always visible -->
  <div class="col-ref" id="col-ref"></div>

  <div class="step-body" id="step-body"></div>

  <div class="controls">
    <button class="btn-pause" id="btn-pause" title="הפסקה (גדי בטלפון)">⏸ הפסק</button>
    <button class="btn-back" id="btn-back" title="חזור צעד אחורה">← אחורה</button>
    <span></span>
    <button class="btn-next" id="btn-next">✓ בוצע, הבא →</button>
  </div>

  <div class="footer">
    <div class="pass-jump" id="pass-jump"></div>
    <button class="reset-btn" id="btn-reset" title="להתחיל מהתחלה">איפוס מלא</button>
  </div>
</div>

<div class="pause-overlay" id="pause-overlay">
  <div class="pause-card">
    <div class="pause-emoji">☕</div>
    <div class="pause-title">הופסק</div>
    <div class="pause-subtitle">גדי בטלפון? קפה? אין לחץ.</div>
    <div class="pause-timer" id="pause-timer">00:00</div>
    <div class="pause-subtitle" style="font-size: 13px; opacity: 0.7;">המקום שלך נשמר. תמשיך כשמוכן.</div>
    <button class="pause-resume" id="btn-resume">▶ ממשיכים</button>
  </div>
</div>

<script>
'use strict';

// ============================================================================
// COLUMN DEFINITIONS — drives the persistent reference bar
// ============================================================================

var COLUMNS = [
  { letter: 'A', name: 'row_id',             cat: 'auto'   },
  { letter: 'B', name: 'file_path',          cat: 'auto'   },
  { letter: 'C', name: 'file_name',          cat: 'auto'   },
  { letter: 'D', name: 'file_size_kb',       cat: 'auto'   },
  { letter: 'E', name: 'folder_hint',        cat: 'auto'   },
  { letter: 'F', name: 'file_modified_date', cat: 'auto'   },
  { letter: 'G', name: 'client_name',        cat: 'human'  },
  { letter: 'H', name: 'doc_tag',            cat: 'human'  },
  { letter: 'I', name: 'direction',          cat: 'human'  },
  { letter: 'J', name: 'doc_date',           cat: 'human'  },
  { letter: 'K', name: 'description',        cat: 'human'  },
  { letter: 'L', name: 'status',             cat: 'script' }
];

function menuHe(text) { return '<span class="menu-he">' + text + '</span>'; }
function menuEn(text) { return '<span class="menu-en">' + text + '</span>'; }
function menu(he, en) { return menuHe(he) + ' <span style="font-size: 0.85em; color: var(--ink-faint);">(' + menuEn(en) + ')</span>'; }
function kbd(text) { return '<span class="kbd">' + text + '</span>'; }
function lit(text) { return '<span class="literal">' + text + '</span>'; }
function cell(addr) { return '<span class="cell">' + addr + '</span>'; }
function substeps(items) {
  return '<div class="substeps"><ol>' + items.map(function (i) { return '<li>' + i + '</li>'; }).join('') + '</ol></div>';
}

// ============================================================================
// WORKFLOW DATA
// ============================================================================

var WORKFLOWS = {
  migration_excel_filling: {
    name_he: 'מילוי Excel למיגרציה',
    name_en: 'Migration Excel Filling',
    passes: [

      // PASS 0 — PRE-FLIGHT
      {
        title_he: 'בדיקה ראשונית של אקסל',
        title_en: 'Pre-flight Excel sanity check',
        emoji: '🛡️',
        activeColumn: null,  // No specific column highlighted in pre-flight
        landing: {

// STATE
var STORAGE_KEY = 'gadiw_teleprompter_state_v3';

function defaultState() {
  return {
    workflowKey: 'migration_excel_filling',
    passIdx: 0,
    stepIdx: 0,
    isPaused: false,
    pauseStartedAt: null,
    pauseTotalSeconds: 0,
    completed: false,
    landingShown: {},
    sessionStartedAt: Date.now()
  };
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    var parsed = JSON.parse(raw);
    var d = defaultState();
    Object.keys(parsed).forEach(function (k) { d[k] = parsed[k]; });
    if (!d.landingShown) d.landingShown = {};
    return d;
  } catch (e) { return defaultState(); }
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
  catch (e) { console.warn('Could not save state:', e); }
}

var state = loadState();

function currentWorkflow() { return WORKFLOWS[state.workflowKey]; }
function currentPass() {
  var w = currentWorkflow();
  if (!w || state.passIdx >= w.passes.length) return null;
  return w.passes[state.passIdx];
}
function currentStep() {
  var p = currentPass();
  if (!p || state.stepIdx >= p.steps.length) return null;
  return p.steps[state.stepIdx];
}
function totalStepsAcross() {
  var w = currentWorkflow();
  return w.passes.reduce(function (sum, pass) { return sum + pass.steps.length; }, 0);
}
function stepsCompletedSoFar() {
  var w = currentWorkflow();
  var done = 0;
  for (var i = 0; i < state.passIdx; i++) {
    done += w.passes[i].steps.length;
  }
  done += state.stepIdx;
  return done;
}
function isLastStep() {
  var w = currentWorkflow();
  return (state.passIdx === w.passes.length - 1) &&
         (state.stepIdx === w.passes[state.passIdx].steps.length - 1);
}
function isFirstStep() {
  return state.passIdx === 0 && state.stepIdx === 0;
}

var els = {
  workflowName: document.getElementById('workflow-name'),
  passTitle:    document.getElementById('pass-title'),
  passCounter:  document.getElementById('pass-counter'),
  progressBar:  document.getElementById('progress-bar'),
  pauseBadge:   document.getElementById('pause-badge'),
  colRef:       document.getElementById('col-ref'),
  stepBody:     document.getElementById('step-body'),
  btnBack:      document.getElementById('btn-back'),
  btnNext:      document.getElementById('btn-next'),
  btnPause:     document.getElementById('btn-pause'),
  btnReset:     document.getElementById('btn-reset'),
  passJump:     document.getElementById('pass-jump'),
  pauseOverlay: document.getElementById('pause-overlay'),
  pauseTimer:   document.getElementById('pause-timer'),
  btnResume:    document.getElementById('btn-resume')
};

function renderColumnReference() {
  var pass = currentPass();
  var activeLetter = pass && pass.activeColumn ? pass.activeColumn : null;

  var html = COLUMNS.map(function (col) {
    var cls = 'col-chip cat-' + col.cat;
    if (activeLetter && col.letter === activeLetter) {
      cls += ' is-active';
    }
    return '<span class="' + cls + '">' +
             '<span class="col-chip-letter">' + col.letter + '</span>' +
             '<span class="col-chip-name">' + col.name + '</span>' +
           '</span>';
  }).join('');
  els.colRef.innerHTML = html;
}

function render() {
  var w = currentWorkflow();
  els.workflowName.textContent = w.name_he + ' · ' + w.name_en;

  if (state.completed) {
    renderComplete();
    return;
  }

  els.btnNext.disabled = false;

  var pass = currentPass();
  var step = currentStep();

  els.passTitle.textContent = (pass.emoji ? pass.emoji + '  ' : '') + pass.title_he;
  els.passCounter.textContent = 'מעבר ' + (state.passIdx) + ' מתוך ' + (w.passes.length - 1);

  var pct = (stepsCompletedSoFar() / totalStepsAcross()) * 100;
  els.progressBar.style.width = pct + '%';

  // Render the column reference bar — always visible
  renderColumnReference();

  var isFirstStepOfPass = state.stepIdx === 0;
  var landingNotShown = !state.landingShown[state.passIdx];
  var showLanding = isFirstStepOfPass && landingNotShown && pass.landing;

  els.stepBody.innerHTML = renderStep(step, pass, showLanding);

  if (showLanding) {
    state.landingShown[state.passIdx] = true;
  }

  wireLiterals();

  els.btnBack.disabled = isFirstStep();
  els.btnNext.disabled = false;
  els.btnNext.classList.toggle('is-final', isLastStep());
  els.btnNext.textContent = isLastStep() ? '🏁 סיים' : '✓ בוצע, הבא →';

  renderJumpDots();
  saveState(state);
  els.stepBody.scrollTop = 0;
}

function renderStep(step, pass, showLanding) {
  var stepNum = state.stepIdx + 1;
  var totalInPass = pass.steps.length;

  var html = '';

  if (showLanding) {
    var l = pass.landing;
    html += '<div class="landing">';
    html +=   '<div class="landing-emoji">' + l.emoji + '</div>';
    html +=   '<div class="landing-title">' + l.title_he + '</div>';
    html +=   '<div class="landing-body">' + l.body_he + '</div>';
    if (l.target_he) {
      html += '<div class="landing-target">' + l.target_he + '</div>';
    }
    html += '</div>';
  }

  html += '<div class="step-header">';
  html +=   '<div class="step-counter">צעד ' + stepNum + ' מתוך ' + totalInPass + '</div>';
  if (step.tag) {
    html += '<div class="step-tag">' + step.tag + '</div>';
  }
  html += '</div>';

  html += '<div class="step-action">' + step.action_he + '</div>';

  if (step.detail_he) {
    html += '<div class="step-detail">' + step.detail_he + '</div>';
  }
  if (step.detail_en) {
    html += '<div class="en">' + step.detail_en + '</div>';
  }

  if (step.substeps_he && step.substeps_he.length) {
    html += substeps(step.substeps_he);
  }

  if (step.verify_title_he && step.verify_body_he) {
    html += '<div class="verify">';
    html +=   '<div class="verify-title">✓ ' + step.verify_title_he + '</div>';
    html +=   '<div class="verify-body">' + step.verify_body_he + '</div>';
    html += '</div>';
  }

  if (step.tip_he) html += '<div class="tip">' + step.tip_he + '</div>';
  if (step.warn_he) html += '<div class="warn">' + step.warn_he + '</div>';
  if (step.danger_he) html += '<div class="danger">' + step.danger_he + '</div>';

  return html;
}

function renderComplete() {
  var minutes = Math.floor((Date.now() - state.sessionStartedAt) / 60000);
  var pauseMin = Math.floor(state.pauseTotalSeconds / 60);
  var workMin = Math.max(0, minutes - pauseMin);

  els.passTitle.textContent = '🎉 הסתיים בהצלחה';
  els.passCounter.textContent = 'כל המעברים הושלמו';
  els.progressBar.style.width = '100%';

  renderColumnReference();

  els.stepBody.innerHTML = '' +
    '<div class="complete-screen">' +
      '<div class="complete-icon">🏆</div>' +
      '<div class="complete-title">סיימנו את האקסל!</div>' +
      '<div class="complete-message">' +
        'עבודה זמן: <strong>' + workMin + ' דקות</strong>' +
        (pauseMin > 0 ? '<br>הפסקות: <strong>' + pauseMin + ' דקות</strong>' : '') +
        '<br><br>הצעד הבא: סגור את אקסל ועבור ל-PowerShell להרצת ה-dry-run.' +
        '<br><br><em>זה היה החלק הקשה. ההעלאה היא 10 דקות של פעולה אוטומטית.</em>' +
      '</div>' +
    '</div>';

  els.btnBack.disabled = false;
  els.btnNext.disabled = true;
  els.btnNext.textContent = '✓ הסתיים';

  renderJumpDots();
}

function renderJumpDots() {
  var w = currentWorkflow();
  var html = '';
  var labels = ['בדיקה ראשונית', 'שמות לקוחות', 'תיוג', 'כיוון', 'אופציונלי', 'בדיקה אחרונה'];
  for (var i = 0; i < w.passes.length; i++) {
    var cls = 'jump-dot';
    if (i < state.passIdx) cls += ' is-done';
    if (i === state.passIdx && !state.completed) cls += ' is-current';
    if (state.completed) cls += ' is-done';
    var label = String(i);
    var tooltip = 'מעבר ' + i + (labels[i] ? ' — ' + labels[i] : '');
    html += '<button class="' + cls + '" data-pass="' + i + '" title="' + tooltip + '">' + label + '</button>';
  }
  els.passJump.innerHTML = html;

  Array.from(els.passJump.querySelectorAll('.jump-dot')).forEach(function (btn) {
    btn.addEventListener('click', function () {
      var pIdx = parseInt(btn.getAttribute('data-pass'), 10);
      jumpToPass(pIdx);
    });
  });
}

function wireLiterals() {
  Array.from(els.stepBody.querySelectorAll('.literal')).forEach(function (el) {
    el.addEventListener('click', function () {
      var text = el.textContent;
      try {
        navigator.clipboard.writeText(text).then(function () {
          el.classList.add('copied');
          var prev = el.textContent;
          el.textContent = '✓ הועתק';
          setTimeout(function () {
            el.classList.remove('copied');
            el.textContent = prev;
          }, 1200);
        });
      } catch (e) {
        var range = document.createRange();
        range.selectNode(el);
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    });
  });
}

function next() {
  if (state.completed) return;
  var pass = currentPass();
  if (state.stepIdx < pass.steps.length - 1) {
    state.stepIdx++;
  } else {
    var w = currentWorkflow();
    if (state.passIdx < w.passes.length - 1) {
      state.passIdx++;
      state.stepIdx = 0;
    } else {
      state.completed = true;
    }
  }
  render();
}

function back() {
  if (state.completed) {
    state.completed = false;
    render();
    return;
  }
  if (state.stepIdx > 0) {
    state.stepIdx--;
  } else if (state.passIdx > 0) {
    state.passIdx--;
    var prevPass = currentWorkflow().passes[state.passIdx];
    state.stepIdx = prevPass.steps.length - 1;
  }
  render();
}

function jumpToPass(passIdx) {
  state.passIdx = passIdx;
  state.stepIdx = 0;
  state.completed = false;
  state.landingShown[passIdx] = false;
  render();
}

function resetAll() {
  if (!confirm('להתחיל מההתחלה? כל ההתקדמות תאבד.')) return;
  state = defaultState();
  saveState(state);
  render();
}

var pauseTimerInterval = null;

function togglePause() {
  if (state.isPaused) resumeFromPause();
  else enterPause();
}

function enterPause() {
  state.isPaused = true;
  state.pauseStartedAt = Date.now();
  saveState(state);
  els.pauseBadge.classList.add('is-paused');
  els.btnPause.classList.add('is-paused');
  els.btnPause.textContent = '▶ ממשיכים';
  els.pauseOverlay.classList.add('is-visible');
  startPauseTimer();
}

function resumeFromPause() {
  if (state.pauseStartedAt) {
    var elapsedSec = Math.floor((Date.now() - state.pauseStartedAt) / 1000);
    state.pauseTotalSeconds += elapsedSec;
  }
  state.isPaused = false;
  state.pauseStartedAt = null;
  saveState(state);
  els.pauseBadge.classList.remove('is-paused');
  els.btnPause.classList.remove('is-paused');
  els.btnPause.textContent = '⏸ הפסק';
  els.pauseOverlay.classList.remove('is-visible');
  stopPauseTimer();
}

function startPauseTimer() {
  stopPauseTimer();
  updatePauseTimerDisplay();
  pauseTimerInterval = setInterval(updatePauseTimerDisplay, 1000);
}

function stopPauseTimer() {
  if (pauseTimerInterval) {
    clearInterval(pauseTimerInterval);
    pauseTimerInterval = null;
  }
}

function updatePauseTimerDisplay() {
  if (!state.pauseStartedAt) return;
  var sec = Math.floor((Date.now() - state.pauseStartedAt) / 1000);
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
  els.pauseTimer.textContent = pad(m) + ':' + pad(s);
}

if (state.isPaused && state.pauseStartedAt) {
  els.pauseBadge.classList.add('is-paused');
  els.btnPause.classList.add('is-paused');
  els.btnPause.textContent = '▶ ממשיכים';
  els.pauseOverlay.classList.add('is-visible');
  startPauseTimer();
}

els.btnNext.addEventListener('click', next);
els.btnBack.addEventListener('click', back);
els.btnPause.addEventListener('click', togglePause);
els.btnResume.addEventListener('click', resumeFromPause);
els.btnReset.addEventListener('click', resetAll);

document.addEventListener('keydown', function (e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowLeft') {
    e.preventDefault();
    if (!state.isPaused && !els.btnNext.disabled) next();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (!state.isPaused && !els.btnBack.disabled) back();
  } else if (e.key === 'p' || e.key === 'P') {
    e.preventDefault();
    togglePause();
  }
});

render();
</script>
</body>
</html>
