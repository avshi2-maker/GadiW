<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="app-version" content="17042026-v2">
<title>מערכת ניהול משרד עו"ד</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ========================================================================
   RESET + BASE
   ======================================================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Assistant','Heebo',system-ui,-apple-system,sans-serif;
  font-size:14px;
  color:#1a1a1a;
  background:#f5f5f3;
  direction:rtl;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

/* ========================================================================
   THEME TOKENS
   ======================================================================== */
:root{
  --c-bg:#f5f5f3;
  --c-surface:#ffffff;
  --c-surface-2:#faf9f6;
  --c-border:#e5e3dc;
  --c-border-strong:#d4d1c7;
  --c-text:#1a1a1a;
  --c-text-muted:#6b6b66;
  --c-text-faint:#9a9a94;
  --c-primary:#1e3a5f;
  --c-primary-soft:#e8eef5;
  --c-primary-text:#0f2440;
  --c-accent:#b8860b;
  --c-success:#15803d;
  --c-success-soft:#dcfce7;
  --c-warning:#b45309;
  --c-warning-soft:#fef3c7;
  --c-danger:#b91c1c;
  --c-danger-soft:#fee2e2;
  --c-info:#1d4ed8;
  --c-info-soft:#dbeafe;
  --radius:8px;
  --radius-lg:12px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow:0 2px 8px rgba(0,0,0,.06);
}

/* ========================================================================
   LAYOUT
   ======================================================================== */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* Sidebar */
.sidebar{
  background:var(--c-surface);
  border-inline-start:1px solid var(--c-border);
  padding:20px 0;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{padding:0 20px 20px;border-bottom:1px solid var(--c-border);margin-bottom:16px}
.brand-row{display:flex;align-items:center;gap:10px}
.brand-logo{
  width:36px;height:36px;border-radius:8px;
  background:var(--c-primary);color:#fff;
  display:grid;place-items:center;font-weight:700;font-size:18px;
}
.brand-name{font-weight:600;font-size:15px}
.brand-sub{font-size:11px;color:var(--c-text-faint);margin-top:2px}

.nav{padding:0 12px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;margin-bottom:2px;
  border-radius:var(--radius);cursor:pointer;
  font-size:14px;color:var(--c-text);
  transition:background .15s;
}
.nav-item:hover{background:var(--c-surface-2)}
.nav-item.active{background:var(--c-primary-soft);color:var(--c-primary-text);font-weight:500}
.nav-item .badge{margin-inline-start:auto;font-size:11px;background:var(--c-surface-2);padding:1px 7px;border-radius:10px;color:var(--c-text-muted)}
.nav-item.active .badge{background:#fff}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}

.nav-section{font-size:11px;color:var(--c-text-faint);text-transform:uppercase;letter-spacing:.5px;padding:16px 12px 6px;font-weight:600}

/* Main */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{
  background:var(--c-surface);
  border-bottom:1px solid var(--c-border);
  padding:14px 24px;
  display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:10;
}
.page-title{font-size:18px;font-weight:600}
.topbar-spacer{flex:1}
.topbar-search{
  position:relative;
  width:260px;
}
.topbar-search input{
  width:100%;padding:8px 34px 8px 12px;
  border:1px solid var(--c-border);border-radius:var(--radius);
  background:var(--c-surface-2);font-size:13px;font-family:inherit;
}
.topbar-search input:focus{outline:none;border-color:var(--c-primary);background:#fff}
.topbar-search .search-icon{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  color:var(--c-text-faint);pointer-events:none;
}

.content{padding:24px;flex:1;overflow-x:hidden}

/* ========================================================================
   BUTTONS
   ======================================================================== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius);
  border:1px solid var(--c-border-strong);background:#fff;
  font-family:inherit;font-size:13px;color:var(--c-text);
  cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.btn:hover{background:var(--c-surface-2)}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--c-primary);color:#fff;border-color:var(--c-primary)}
.btn.primary:hover{background:#16314f}
.btn.danger{background:var(--c-danger);color:#fff;border-color:var(--c-danger)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--c-surface-2)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.icon{padding:7px;aspect-ratio:1}

/* ========================================================================
   CARDS
   ======================================================================== */
.card{
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--radius-lg);
  overflow:hidden;
}
.card-header{
  padding:14px 18px;border-bottom:1px solid var(--c-border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.card-title{font-size:15px;font-weight:600}
.card-body{padding:18px}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--radius-lg);
  padding:14px 16px;
}
.kpi.accent-warn{background:var(--c-warning-soft);border-color:#f7d794}
.kpi.accent-danger{background:var(--c-danger-soft);border-color:#fbb4b4}
.kpi-label{font-size:12px;color:var(--c-text-muted);margin-bottom:6px}
.kpi.accent-warn .kpi-label{color:var(--c-warning)}
.kpi.accent-danger .kpi-label{color:var(--c-danger)}
.kpi-value{font-size:24px;font-weight:600;line-height:1.1}
.kpi.accent-warn .kpi-value{color:var(--c-warning)}
.kpi.accent-danger .kpi-value{color:var(--c-danger)}
.kpi-foot{font-size:11px;color:var(--c-text-faint);margin-top:4px}

/* ========================================================================
   TABLES
   ======================================================================== */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{
  text-align:right;padding:10px 14px;
  font-weight:500;color:var(--c-text-muted);font-size:12px;
  border-bottom:1px solid var(--c-border);background:var(--c-surface-2);
  white-space:nowrap;
}
table.tbl td{padding:12px 14px;border-bottom:1px solid var(--c-border)}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr.clickable{cursor:pointer;transition:background .1s}
table.tbl tr.clickable:hover{background:var(--c-surface-2)}
table.tbl .num{font-variant-numeric:tabular-nums}

/* ========================================================================
   BADGES / PILLS
   ======================================================================== */
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:500;white-space:nowrap;
}
.badge.b-neutral{background:#ececea;color:#3a3a37}
.badge.b-info{background:var(--c-info-soft);color:var(--c-info)}
.badge.b-success{background:var(--c-success-soft);color:var(--c-success)}
.badge.b-warn{background:var(--c-warning-soft);color:var(--c-warning)}
.badge.b-danger{background:var(--c-danger-soft);color:var(--c-danger)}
.badge.b-primary{background:var(--c-primary-soft);color:var(--c-primary-text)}

/* ========================================================================
   FORMS
   ======================================================================== */
.form-row{display:grid;gap:14px;margin-bottom:14px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
.field label{
  display:block;font-size:12px;color:var(--c-text-muted);margin-bottom:5px;font-weight:500;
}
.field label .req{color:var(--c-danger);margin-inline-start:3px}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;
  border:1px solid var(--c-border-strong);border-radius:var(--radius);
  background:#fff;font-size:13px;font-family:inherit;color:var(--c-text);
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px var(--c-primary-soft);
}
.field textarea{resize:vertical;min-height:72px}
.field .hint{font-size:11px;color:var(--c-text-faint);margin-top:4px}
.field .err{font-size:11px;color:var(--c-danger);margin-top:4px}
.field.checkbox{display:flex;align-items:center;gap:8px}
.field.checkbox input{width:auto}
.field.checkbox label{margin:0}

/* ========================================================================
   TABS
   ======================================================================== */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--c-border);padding:0 18px}
.tab{
  padding:12px 14px;font-size:13px;color:var(--c-text-muted);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;
}
.tab:hover{color:var(--c-text)}
.tab.active{color:var(--c-primary);border-bottom-color:var(--c-primary);font-weight:500}

/* ========================================================================
   MODAL
   ======================================================================== */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(20,20,20,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;
}
.modal{
  background:#fff;border-radius:var(--radius-lg);
  width:100%;max-width:720px;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:var(--shadow);
}
.modal.wide{max-width:960px}
.modal-head{
  padding:16px 20px;border-bottom:1px solid var(--c-border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:16px;font-weight:600}
.modal-close{
  background:none;border:none;font-size:22px;color:var(--c-text-muted);
  cursor:pointer;padding:0;width:28px;height:28px;border-radius:6px;
}
.modal-close:hover{background:var(--c-surface-2);color:var(--c-text)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{
  padding:14px 20px;border-top:1px solid var(--c-border);
  display:flex;justify-content:flex-start;gap:10px;background:var(--c-surface-2);
}

/* Step indicator for intake wizard */
.steps{display:flex;gap:4px;margin-bottom:20px}
.step{
  flex:1;height:4px;background:var(--c-border);border-radius:2px;
}
.step.done,.step.current{background:var(--c-primary)}

/* ========================================================================
   TIMELINE
   ======================================================================== */
.timeline{border-inline-start:2px solid var(--c-border);padding-inline-start:16px}
.tl-item{position:relative;padding-bottom:14px}
.tl-dot{
  position:absolute;inset-inline-start:-22px;top:4px;
  width:10px;height:10px;border-radius:50%;background:var(--c-text-muted);
  border:2px solid var(--c-surface);
}
.tl-dot.success{background:var(--c-success)}
.tl-dot.info{background:var(--c-info)}
.tl-dot.danger{background:var(--c-danger)}
.tl-title{font-size:13px;font-weight:500}
.tl-meta{font-size:11px;color:var(--c-text-faint);margin-top:2px}

/* ========================================================================
   DETAIL LAYOUT
   ======================================================================== */
.detail-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.info-block{
  background:var(--c-surface-2);padding:12px 14px;border-radius:var(--radius);
}
.info-label{font-size:11px;color:var(--c-text-muted);margin-bottom:4px}
.info-value{font-size:13px;font-weight:500}
.info-sub{font-size:12px;color:var(--c-text-muted);margin-top:2px}

/* ========================================================================
   UTILITIES
   ======================================================================== */
.hidden{display:none !important}
.spacer{height:16px}
.flex{display:flex;align-items:center;gap:10px}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.muted{color:var(--c-text-muted)}
.faint{color:var(--c-text-faint)}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace}
.num{font-variant-numeric:tabular-nums}
.ta-c{text-align:center}
.ta-l{text-align:left}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.empty-state{text-align:center;padding:40px 20px;color:var(--c-text-faint)}
.empty-state-title{font-size:14px;color:var(--c-text-muted);margin-bottom:4px}

/* Toast */
.toast-host{position:fixed;bottom:20px;inset-inline-end:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{
  background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:var(--radius);
  font-size:13px;box-shadow:var(--shadow);animation:slideIn .2s;
}
.toast.success{background:var(--c-success)}
.toast.error{background:var(--c-danger)}
@keyframes slideIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Login screen */
.login-wrap{
  min-height:100vh;display:grid;place-items:center;
  background:linear-gradient(135deg,#f5f5f3 0%,#e8eef5 100%);
}
.login-card{
  background:#fff;padding:36px 32px;border-radius:var(--radius-lg);
  width:100%;max-width:400px;border:1px solid var(--c-border);
  box-shadow:var(--shadow);
}
.login-logo{
  width:52px;height:52px;border-radius:12px;
  background:var(--c-primary);color:#fff;
  display:grid;place-items:center;font-weight:700;font-size:24px;
  margin:0 auto 18px;
}
.login-title{text-align:center;font-size:20px;font-weight:600;margin-bottom:6px}
.login-sub{text-align:center;color:var(--c-text-muted);font-size:13px;margin-bottom:24px}

/* Responsive */
@media (max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .detail-grid{grid-template-columns:1fr}
  .form-row.cols-2,.form-row.cols-3{grid-template-columns:1fr}
}
</style>
</head>

/* ========================================================================

function sbQ(builder){
  return new Promise(function(resolve){
    try{
      builder.then(function(res){
        resolve({ data: res.data, error: res.error });
      }).catch(function(err){
        resolve({ data: null, error: err });
      });
    }catch(e){
      resolve({ data: null, error: e });
    }
  });
}

/* ========================================================================

function $(sel){ return document.querySelector(sel); }
function $$(sel){ return Array.prototype.slice.call(document.querySelectorAll(sel)); }

function el(tag, props, children){
  var e = document.createElement(tag);
  if(props){ for(var k in props){
    if(k === 'className') e.className = props[k];
    else if(k === 'innerHTML') e.innerHTML = props[k];
    else if(k.indexOf('on')===0) e[k.toLowerCase()] = props[k];
    else e.setAttribute(k, props[k]);
  }}
  if(children){
    if(!Array.isArray(children)) children = [children];
    for(var i=0;i<children.length;i++){
      var c = children[i]; if(c==null) continue;
      if(typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    }
  }
  return e;
}

function escapeHtml(s){
  if(s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtMoney(n){
  if(n == null || isNaN(n)) return '₪ 0';
  return '₪ ' + Number(n).toLocaleString('he-IL', {minimumFractionDigits:0, maximumFractionDigits:2});
}

function fmtDate(d){
  if(!d) return '—';
  var dt = new Date(d);
  if(isNaN(dt)) return '—';
  return dt.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit', year:'numeric'});
}

function fmtDateTime(d){
  if(!d) return '—';
  var dt = new Date(d);
  if(isNaN(dt)) return '—';
  return dt.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit'})
    + ' ' + dt.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
}

function relativeDays(d){
  if(!d) return '';
  var dt = new Date(d);
  var now = new Date(); now.setHours(0,0,0,0);
  var target = new Date(dt); target.setHours(0,0,0,0);
  var diff = Math.round((target - now) / 86400000);
  if(diff === 0) return 'היום';
  if(diff === 1) return 'מחר';
  if(diff === -1) return 'אתמול';
  if(diff > 0) return 'בעוד ' + diff + ' ימים';
  return 'לפני ' + Math.abs(diff) + ' ימים';
}

function statusBadge(status){
  var map = {
    'בבדיקה':'b-neutral',
    'בטיפול':'b-info',
    'ממתין למסמכים':'b-warn',
    'בהמתנה':'b-warn',
    'בערעור':'b-info',
    'נסגר':'b-success',
    'בוטל':'b-neutral',
    'ליד חדש':'b-primary',
    'פוטנציאלי':'b-info',
    'לקוח פעיל':'b-success',
    'לקוח לשעבר':'b-neutral'
  };
  var cls = map[status] || 'b-neutral';
  return '<span class="badge ' + cls + '">' + escapeHtml(status) + '</span>';
}

function priorityBadge(p){
  var map = {'דחופה':'b-danger', 'גבוהה':'b-warn', 'רגילה':'b-neutral', 'נמוכה':'b-neutral'};
  return '<span class="badge ' + (map[p]||'b-neutral') + '">' + escapeHtml(p||'רגילה') + '</span>';
}

function toast(msg, kind){
  var t = el('div', { className: 'toast ' + (kind||'') }, msg);
  $('#toastHost').appendChild(t);
  setTimeout(function(){ t.remove(); }, 3000);
}

/* Israeli ID validation (Luhn-like check) */
function validateIsraeliID(id){
  if(!id) return true; // optional field
  id = String(id).replace(/\D/g,'').padStart(9,'0');
  if(id.length !== 9) return false;
  var sum = 0;
  for(var i=0;i<9;i++){
    var d = parseInt(id[i],10) * ((i % 2) + 1);
    if(d > 9) d -= 9;
    sum += d;
  }
  return sum % 10 === 0;
}

var screenTitles = {
  dashboard:'דשבורד', matters:'תיקים', clients:'לקוחות',
  calendar:'דיונים ומועדים', tasks:'משימות', time:'שעות עבודה',
  invoices:'חשבוניות', conflicts:'ניגוד עניינים', settings:'הגדרות',
  matter_detail:'פרטי תיק', client_detail:'פרטי לקוח'
};

function navigateTo(screen, param){
  state.screen = screen;
  if(param) state.param = param;
  $$('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  var active = document.querySelector('.nav-item[data-screen="'+screen+'"]');
  if(active) active.classList.add('active');
  $('#pageTitle').textContent = screenTitles[screen] || '';
  render();
}

function render(){
  var c = $('#content'); c.innerHTML = '';
  switch(state.screen){
    case 'dashboard':      renderDashboard(c); break;
    case 'matters':        renderMatters(c); break;
    case 'matter_detail':  renderMatterDetail(c); break;
    case 'clients':        renderClients(c); break;
    case 'client_detail':  renderClientDetail(c); break;
    case 'calendar':       renderCalendar(c); break;
    case 'tasks':          renderTasks(c); break;
    case 'time':           renderTimeEntries(c); break;
    case 'invoices':       renderInvoices(c); break;
    case 'conflicts':      renderConflicts(c); break;
    case 'settings':       renderSettings(c); break;
    default:               renderDashboard(c);
  }
}

async function toggleTask(id, done){
  if(!sb){ toast('מצב הדגמה — לא נשמר', 'error'); return; }
  var r = await sbQ(sb.from('tasks').update({ done: done, done_at: done ? new Date().toISOString() : null }).eq('id', id));
  if(r.error){ toast('שגיאה: '+r.error.message, 'error'); return; }
  await loadTasks(); updateNavCounts(); render();
  toast(done?'משימה הושלמה':'משימה נפתחה מחדש', 'success');
}

/* ========================================================================
   SCREEN: TIME ENTRIES
   ======================================================================== */
function renderTimeEntries(root){
  var html = '';
  var totalMin = state.timeEntries.reduce(function(s,t){return s+(t.minutes||0);},0);
  var totalAmt = state.timeEntries.reduce(function(s,t){return s+(Number(t.amount)||0);},0);
  var unbilledAmt = state.timeEntries.filter(function(t){return !t.invoiced;}).reduce(function(s,t){return s+(Number(t.amount)||0);},0);

  html += '<div class="grid-3" style="margin-bottom:16px">';
  html += '  <div class="kpi"><div class="kpi-label">סה"כ שעות</div><div class="kpi-value num">'+(totalMin/60).toFixed(1)+'</div></div>';
  html += '  <div class="kpi"><div class="kpi-label">סה"כ סכום</div><div class="kpi-value num">'+fmtMoney(totalAmt)+'</div></div>';
  html += '  <div class="kpi accent-warn"><div class="kpi-label">טרם חויב</div><div class="kpi-value num">'+fmtMoney(unbilledAmt)+'</div></div>';
  html += '</div>';

  html += '<div class="flex-between" style="margin-bottom:12px"><div class="muted">'+state.timeEntries.length+' רישומים</div>';
  html += '<button class="btn primary" onclick="openTimeForm()">+ רישום חדש</button></div>';

  html += '<div class="card"><div class="tbl-wrap"><table class="tbl">';
  html += '<thead><tr><th>תאריך</th><th>תיק</th><th>תיאור</th><th>דקות</th><th>תעריף</th><th>סכום</th><th>סטטוס</th></tr></thead><tbody>';
  state.timeEntries.forEach(function(t){
    html += '<tr>';
    html += '<td>'+fmtDate(t.entry_date)+'</td>';
    html += '<td class="muted">'+(t.matters?escapeHtml(t.matters.matter_number):'—')+'</td>';
    html += '<td>'+escapeHtml(t.description||'')+'</td>';
    html += '<td class="num">'+(t.minutes||0)+'</td>';
    html += '<td class="num">'+fmtMoney(t.rate_per_hour)+'</td>';
    html += '<td class="num">'+fmtMoney(t.amount)+'</td>';
    html += '<td>'+(t.invoiced?'<span class="badge b-success">חויב</span>':'<span class="badge b-warn">טרם</span>')+'</td>';
    html += '</tr>';
  });
  if(state.timeEntries.length===0) html += '<tr><td colspan="7" class="empty-state">אין רישומי שעות עדיין</td></tr>';
  html += '</tbody></table></div></div>';

  root.innerHTML = html;
}

/* ========================================================================
   SCREEN: CONFLICT CHECKS
   ======================================================================== */
function renderConflicts(root){
  var html = '';
  html += '<div class="card" style="margin-bottom:16px"><div class="card-body">';
  html += '<div style="font-size:14px;font-weight:500;margin-bottom:10px">בדיקת ניגוד עניינים ידנית</div>';
  html += '<div class="muted" style="font-size:13px;margin-bottom:14px">בדוק אם שם (לקוח חדש או צד שכנגד) מתנגש עם לקוחות או תיקים קיימים במערכת.</div>';
  html += '<div class="flex"><input type="text" id="conflictInput" placeholder="הזן שם מלא לבדיקה..." style="flex:1;padding:9px 11px;border:1px solid var(--c-border-strong);border-radius:var(--radius);font-family:inherit">';
  html += '<button class="btn primary" onclick="runConflictCheck()">בדיקה</button></div>';
  html += '<div id="conflictResult" style="margin-top:12px"></div>';
  html += '</div></div>';

  html += '<div class="card"><div class="card-header"><div class="card-title">היסטוריית בדיקות</div></div>';
  html += '<table class="tbl"><thead><tr><th>שם שנבדק</th><th>תוצאה</th><th>הערות</th><th>תאריך</th></tr></thead><tbody>';
  state.conflictChecks.forEach(function(c){
    var badge = c.result==='תקין' ? 'b-success' : c.result==='אזהרה' ? 'b-warn' : 'b-danger';
    html += '<tr><td>'+escapeHtml(c.checked_name)+'</td>';
    html += '<td><span class="badge '+badge+'">'+escapeHtml(c.result)+'</span></td>';
    html += '<td class="muted">'+escapeHtml(c.notes||'—')+'</td>';
    html += '<td>'+fmtDateTime(c.checked_at)+'</td></tr>';
  });
  if(state.conflictChecks.length===0) html += '<tr><td colspan="4" class="empty-state">אין בדיקות בהיסטוריה</td></tr>';
  html += '</tbody></table></div>';

  root.innerHTML = html;
}

function runConflictCheck(){
  var name = $('#conflictInput').value.trim();
  if(!name){ toast('הזן שם לבדיקה', 'error'); return; }
  var matches = [];

  state.clients.forEach(function(c){
    if(c.full_name && c.full_name.indexOf(name) !== -1){
      matches.push({type:'לקוח', text: c.full_name + (c.id_number?' (ת"ז '+c.id_number+')':'')});
    }
  });
  state.matters.forEach(function(m){
    if(m.opposing_party_name && m.opposing_party_name.indexOf(name) !== -1){
      matches.push({type:'צד שכנגד', text: m.opposing_party_name + ' — תיק ' + m.matter_number});
    }
  });

  var out = $('#conflictResult');
  if(matches.length===0){
    out.innerHTML = '<div style="background:var(--c-success-soft);border-radius:var(--radius);padding:12px 14px"><strong style="color:var(--c-success)">✓ תקין</strong><div style="font-size:13px;color:var(--c-success);margin-top:4px">לא נמצאו התנגשויות מול '+state.clients.length+' לקוחות ו-'+state.matters.length+' תיקים</div></div>';
  } else {
    var html = '<div style="background:var(--c-danger-soft);border-radius:var(--radius);padding:12px 14px"><strong style="color:var(--c-danger)">⚠ נמצאו '+matches.length+' התנגשויות</strong><ul style="margin:8px 0 0 20px;font-size:13px;color:var(--c-danger)">';
    matches.forEach(function(m){ html += '<li>['+m.type+'] '+escapeHtml(m.text)+'</li>'; });
    html += '</ul></div>';
    out.innerHTML = html;
  }

  if(sb){
    sbQ(sb.from('conflict_checks').insert({
      checked_name: name,
      result: matches.length ? 'התנגשות' : 'תקין',
      matches_found: matches,
      notes: matches.length ? 'בדיקה ידנית — ' + matches.length + ' התאמות' : 'בדיקה ידנית — ללא התאמות'
    })).then(function(){ loadConflictChecks(); });
  }
}

/* ========================================================================
   INTAKE WIZARD (4 steps)
   ======================================================================== */
function openIntakeWizard(){
  state.intakeStep = 1;
  state.intakeData = {};
  showModal(renderIntakeWizard());
}

function renderIntakeWizard(){
  var step = state.intakeStep;
  var stepsHtml = '<div class="steps">';
  for(var i=1;i<=4;i++){
    var cls = i < step ? 'done' : (i===step ? 'current' : '');
    stepsHtml += '<div class="step '+cls+'"></div>';
  }
  stepsHtml += '</div>';

  var titles = ['פרטי לקוח','בדיקת ניגוד עניינים','פרטי התיק','אישור'];
  var body = '';

  if(step===1){
    body += '<div class="form-row cols-2">';
    body += '  <div class="field"><label>שם פרטי <span class="req">*</span></label><input type="text" id="iFirst" value="'+escapeHtml(state.intakeData.first_name||'')+'"></div>';
    body += '  <div class="field"><label>שם משפחה <span class="req">*</span></label><input type="text" id="iLast" value="'+escapeHtml(state.intakeData.last_name||'')+'"></div>';
    body += '</div>';
    body += '<div class="form-row cols-2">';
    body += '  <div class="field"><label>תעודת זהות</label><input type="text" id="iID" maxlength="9" value="'+escapeHtml(state.intakeData.id_number||'')+'"><div class="hint">9 ספרות · תיבדק תקינות</div></div>';
    body += '  <div class="field"><label>טלפון נייד <span class="req">*</span></label><input type="tel" id="iPhone" placeholder="050-1234567" value="'+escapeHtml(state.intakeData.phone_mobile||'')+'"></div>';
    body += '</div>';
    body += '<div class="form-row cols-2">';
    body += '  <div class="field"><label>אימייל</label><input type="email" id="iEmail" value="'+escapeHtml(state.intakeData.email||'')+'"></div>';
    body += '  <div class="field"><label>עיר</label><input type="text" id="iCity" value="'+escapeHtml(state.intakeData.city||'')+'"></div>';
    body += '</div>';
    body += '<div class="form-row"><div class="field"><label>כתובת</label><input type="text" id="iAddr" value="'+escapeHtml(state.intakeData.address||'')+'"></div></div>';
    body += '<div class="form-row cols-2">';
    body += '  <div class="field"><label>מקור הפנייה</label><select id="iSource"><option value="">—</option>';
    state.sources.forEach(function(s){
      body += '<option value="'+s.id+'" '+(state.intakeData.source_id==s.id?'selected':'')+'>'+escapeHtml(s.name_he)+'</option>';
    });
    body += '  </select></div>';
    body += '  <div class="field checkbox"><input type="checkbox" id="iConsent" '+(state.intakeData.consent_marketing?'checked':'')+'><label for="iConsent">מסכים לקבלת דיוור</label></div>';
    body += '</div>';
  }
  else if(step===2){
    var name = (state.intakeData.first_name||'') + ' ' + (state.intakeData.last_name||'');
    var matches = [];
    state.clients.forEach(function(c){
      if(c.full_name && name.trim() && c.full_name.indexOf(name.trim())!==-1){
        matches.push({type:'לקוח קיים', text: c.full_name});
      }
      if(state.intakeData.id_number && c.id_number === state.intakeData.id_number){
        matches.push({type:'ת"ז קיימת', text: c.full_name + ' (ת"ז '+c.id_number+')'});
      }
    });

    if(matches.length===0){
      body += '<div style="background:var(--c-success-soft);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:start;gap:12px">';
      body += '  <div style="width:24px;height:24px;border-radius:50%;background:var(--c-success);color:white;display:grid;place-items:center;font-size:14px;flex-shrink:0">✓</div>';
      body += '  <div><div style="font-size:14px;font-weight:500;color:var(--c-success)">בדיקת ניגוד עניינים: תקין</div>';
      body += '  <div style="font-size:13px;color:var(--c-success);margin-top:4px">לא נמצאו התנגשויות מול '+state.clients.length+' לקוחות קיימים</div></div></div>';
    } else {
      body += '<div style="background:var(--c-danger-soft);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px">';
      body += '<strong style="color:var(--c-danger)">⚠ נמצאו '+matches.length+' התנגשויות אפשריות</strong>';
      body += '<ul style="margin:8px 0 0 20px;font-size:13px;color:var(--c-danger)">';
      matches.forEach(function(m){ body += '<li>['+m.type+'] '+escapeHtml(m.text)+'</li>'; });
      body += '</ul>';
      body += '<div class="field checkbox" style="margin-top:12px"><input type="checkbox" id="iOverride"><label for="iOverride">אני מאשר כי בדקתי ידנית — אין ניגוד אמיתי</label></div>';
      body += '</div>';
    }

    body += '<div class="field"><label>שם הצד שכנגד (יבדק אוטומטית)</label><input type="text" id="iOpposing" value="'+escapeHtml(state.intakeData.opposing_party_name||'')+'" oninput="state.intakeData.opposing_party_name=this.value"></div>';
  }
  else if(step===3){
    body += '<div class="form-row"><div class="field"><label>כותרת התיק <span class="req">*</span></label><input type="text" id="iTitle" placeholder="לדוגמה: כהן נגד מעסיק בע"מ" value="'+escapeHtml(state.intakeData.title||'')+'"></div></div>';
    body += '<div class="form-row cols-2">';
    body += '  <div class="field"><label>תחום משפטי</label><select id="iField"><option value="">—</option>';
    state.legalFields.forEach(function(f){
      body += '<option value="'+f.id+'" '+(state.intakeData.legal_field_id==f.id?'selected':'')+'>'+escapeHtml(f.name_he)+'</option>';
    });
    body += '  </select></div>';
    body += '  <div class="field"><label>בית משפט</label><select id="iCourt"><option value="">—</option>';
    state.courts.forEach(function(c){
      body += '<option value="'+c.id+'" '+(state.intakeData.court_id==c.id?'selected':'')+'>'+escapeHtml(c.name_he)+'</option>';
    });
    body += '  </select></div>';
    body += '</div>';
    body += '<div class="form-row cols-2">';
    body += '  <div class="field"><label>עדיפות</label><select id="iPrio"><option value="נמוכה">נמוכה</option><option value="רגילה" selected>רגילה</option><option value="גבוהה">גבוהה</option><option value="דחופה">דחופה</option></select></div>';
    body += '  <div class="field"><label>תאריך אירוע</label><input type="date" id="iEventDate" value="'+escapeHtml(state.intakeData.event_date||'')+'"></div>';
    body += '</div>';
    body += '<div class="form-row cols-2">';
    body += '  <div class="field"><label>שכר טרחה</label><input type="number" id="iFee" step="100" placeholder="0" value="'+escapeHtml(state.intakeData.fee_agreed||'')+'"></div>';
    body += '  <div class="field"><label>סוג שכר טרחה</label><select id="iFeeType"><option>קבוע</option><option>שעתי</option><option>תוצאה</option><option>משולב</option></select></div>';
    body += '</div>';
    body += '<div class="form-row"><div class="field"><label>תיאור קצר</label><textarea id="iDesc">'+escapeHtml(state.intakeData.short_description||'')+'</textarea></div></div>';
  }
  else if(step===4){
    body += '<div style="background:var(--c-primary-soft);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px">';
    body += '<div style="font-size:14px;font-weight:500;color:var(--c-primary-text);margin-bottom:8px">סיכום לפני שמירה</div>';
    body += '<div class="grid-2" style="gap:10px">';
    body += '  <div><div class="info-label">לקוח</div><div class="info-value">'+escapeHtml((state.intakeData.first_name||'')+' '+(state.intakeData.last_name||''))+'</div></div>';
    body += '  <div><div class="info-label">טלפון</div><div class="info-value">'+escapeHtml(state.intakeData.phone_mobile||'—')+'</div></div>';
    body += '  <div><div class="info-label">כותרת התיק</div><div class="info-value">'+escapeHtml(state.intakeData.title||'—')+'</div></div>';
    body += '  <div><div class="info-label">שכר טרחה</div><div class="info-value">'+fmtMoney(state.intakeData.fee_agreed)+'</div></div>';
    body += '</div></div>';
    body += '<div class="muted" style="font-size:13px">לחץ "סיום" כדי ליצור את הלקוח והתיק. בדיקת ניגוד עניינים תירשם אוטומטית.</div>';
  }

  var nextLabel = step === 4 ? 'סיום' : 'המשך ›';
  var html = stepsHtml +
    '<div style="font-size:16px;font-weight:600;margin-bottom:14px">'+titles[step-1]+' <span class="faint" style="font-size:12px;font-weight:400;margin-inline-start:8px">שלב '+step+' מתוך 4</span></div>' +
    body +
    '<div class="flex" style="margin-top:20px;gap:8px">' +
    (step>1 ? '<button class="btn" onclick="intakePrev()">‹ חזור</button>' : '') +
    '<div style="flex:1"></div>' +
    '<button class="btn" onclick="closeModal()">ביטול</button>' +
    '<button class="btn primary" onclick="intakeNext()">'+nextLabel+'</button>' +
    '</div>';

  return { title: 'קליטת ליד חדש', html: html };
}

function intakePrev(){
  if(state.intakeStep > 1) { captureIntakeStep(); state.intakeStep--; updateModal(renderIntakeWizard()); }
}

function intakeNext(){
  if(!captureIntakeStep()) return;
  if(state.intakeStep === 4){
    saveIntake(); return;
  }
  state.intakeStep++;
  updateModal(renderIntakeWizard());
}

function captureIntakeStep(){
  var s = state.intakeStep;
  if(s===1){
    state.intakeData.first_name = $('#iFirst') ? $('#iFirst').value.trim() : state.intakeData.first_name;
    state.intakeData.last_name  = $('#iLast')  ? $('#iLast').value.trim()  : state.intakeData.last_name;
    state.intakeData.id_number  = $('#iID')    ? $('#iID').value.trim()    : state.intakeData.id_number;
    state.intakeData.phone_mobile = $('#iPhone') ? $('#iPhone').value.trim() : state.intakeData.phone_mobile;
    state.intakeData.email      = $('#iEmail') ? $('#iEmail').value.trim() : state.intakeData.email;
    state.intakeData.city       = $('#iCity')  ? $('#iCity').value.trim()  : state.intakeData.city;
    state.intakeData.address    = $('#iAddr')  ? $('#iAddr').value.trim()  : state.intakeData.address;
    state.intakeData.source_id  = $('#iSource')? $('#iSource').value       : state.intakeData.source_id;
    state.intakeData.consent_marketing = $('#iConsent') ? $('#iConsent').checked : false;

    if(!state.intakeData.first_name || !state.intakeData.last_name){ toast('שם פרטי ושם משפחה הם שדות חובה', 'error'); return false; }
    if(!state.intakeData.phone_mobile){ toast('טלפון נייד הוא שדה חובה', 'error'); return false; }
    if(state.intakeData.id_number && !validateIsraeliID(state.intakeData.id_number)){ toast('תעודת זהות לא תקינה', 'error'); return false; }
  }
  else if(s===3){
    state.intakeData.title = $('#iTitle') ? $('#iTitle').value.trim() : '';
    state.intakeData.legal_field_id = $('#iField') ? $('#iField').value || null : null;
    state.intakeData.court_id = $('#iCourt') ? $('#iCourt').value || null : null;
    state.intakeData.priority = $('#iPrio') ? $('#iPrio').value : 'רגילה';
    state.intakeData.event_date = $('#iEventDate') ? $('#iEventDate').value || null : null;
    state.intakeData.fee_agreed = $('#iFee') ? parseFloat($('#iFee').value)||0 : 0;
    state.intakeData.fee_type = $('#iFeeType') ? $('#iFeeType').value : 'קבוע';
    state.intakeData.short_description = $('#iDesc') ? $('#iDesc').value.trim() : '';
    if(!state.intakeData.title){ toast('כותרת התיק היא שדה חובה', 'error'); return false; }
  }
  return true;
}

async function saveIntake(){
  if(!sb){
    // Demo mode
    var newId = 'c_demo_' + Date.now();
    state.clients.unshift({
      id: newId,
      full_name: state.intakeData.first_name + ' ' + state.intakeData.last_name,
      first_name: state.intakeData.first_name,
      last_name: state.intakeData.last_name,
      id_number: state.intakeData.id_number,
      phone_mobile: state.intakeData.phone_mobile,
      email: state.intakeData.email,
      city: state.intakeData.city,
      status: 'ליד חדש',
      created_at: new Date().toISOString()
    });
    state.matters.unshift({
      id: 'm_demo_' + Date.now(),
      client_id: newId,
      matter_number: 'MAT-2026-' + String(state.matters.length+1).padStart(3,'0'),
      title: state.intakeData.title,
      status: 'בבדיקה',
      priority: state.intakeData.priority,
      opened_at: new Date().toISOString().slice(0,10),
      client_name: state.intakeData.first_name + ' ' + state.intakeData.last_name,
      fee_agreed: state.intakeData.fee_agreed,
      paid_total: 0,
      balance: state.intakeData.fee_agreed,
      short_description: state.intakeData.short_description
    });
    closeModal();
    updateNavCounts();
    render();
    toast('נשמר (מצב הדגמה)', 'success');
    return;
  }

  // 1. Create client
  var r1 = await sbQ(sb.from('clients').insert({
    first_name: state.intakeData.first_name,
    last_name:  state.intakeData.last_name,
    id_number:  state.intakeData.id_number || null,
    phone_mobile: state.intakeData.phone_mobile,
    email: state.intakeData.email || null,
    city: state.intakeData.city || null,
    address: state.intakeData.address || null,
    source_id: state.intakeData.source_id || null,
    consent_marketing: !!state.intakeData.consent_marketing,
    consent_date: state.intakeData.consent_marketing ? new Date().toISOString() : null,
    status: 'ליד חדש'
  }).select().single());

  if(r1.error){ toast('שגיאה ביצירת לקוח: '+r1.error.message, 'error'); return; }
  var clientId = r1.data.id;

  // 2. Create matter
  var r2 = await sbQ(sb.from('matters').insert({
    client_id: clientId,
    title: state.intakeData.title,
    legal_field_id: state.intakeData.legal_field_id || null,
    court_id: state.intakeData.court_id || null,
    opposing_party_name: state.intakeData.opposing_party_name || null,
    priority: state.intakeData.priority || 'רגילה',
    event_date: state.intakeData.event_date || null,
    fee_agreed: state.intakeData.fee_agreed || 0,
    fee_type: state.intakeData.fee_type || 'קבוע',
    short_description: state.intakeData.short_description || null,
    status: 'בבדיקה'
  }).select().single());

  if(r2.error){ toast('שגיאה ביצירת תיק: '+r2.error.message, 'error'); return; }
  var matterId = r2.data.id;

  // 3. Log conflict check
  await sbQ(sb.from('conflict_checks').insert({
    client_id: clientId,
    matter_id: matterId,
    checked_name: state.intakeData.first_name + ' ' + state.intakeData.last_name,
    result: 'תקין',
    notes: 'בדיקה אוטומטית בעת קליטה'
  }));
  if(state.intakeData.opposing_party_name){
    await sbQ(sb.from('conflict_checks').insert({
      client_id: clientId,
      matter_id: matterId,
      checked_name: state.intakeData.opposing_party_name,
      result: 'תקין',
      notes: 'צד שכנגד — בדיקה אוטומטית'
    }));
  }

  closeModal();
  await loadAll();
  toast('הלקוח והתיק נוצרו בהצלחה', 'success');
  navigateTo('matter_detail', matterId);
}

/* ========================================================================
   MODAL SYSTEM
   ======================================================================== */
function showModal(content){
  var host = $('#modalHost');
  host.innerHTML = '';
  var backdrop = el('div', { className: 'modal-backdrop', onclick: function(e){ if(e.target === backdrop) closeModal(); } });
  var modal = el('div', { className: 'modal wide' });
  var head = el('div', { className: 'modal-head' }, [
    el('div', { className: 'modal-title' }, content.title || ''),
    el('button', { className: 'modal-close', onclick: closeModal }, '×')
  ]);
  var body = el('div', { className: 'modal-body', innerHTML: content.html });
  modal.appendChild(head);
  modal.appendChild(body);
  backdrop.appendChild(modal);
  host.appendChild(backdrop);
}

function updateModal(content){
  var title = document.querySelector('.modal-title');
  var body  = document.querySelector('.modal-body');
  if(title) title.textContent = content.title || '';
  if(body)  body.innerHTML = content.html;
}

function closeModal(){
  $('#modalHost').innerHTML = '';
}

  html += '</div>';
  html += '<div class="form-row cols-2">';
  html += '  <div class="field"><label>תאריך ושעה</label><input type="datetime-local" id="hDate"></div>';

async function saveHearing(){
  var mid = $('#hMatter').value;
  var date = $('#hDate').value;
  if(!mid || !date){ toast('תיק ותאריך הם שדות חובה', 'error'); return; }
  if(!sb){ toast('מצב הדגמה', 'error'); closeModal(); return; }
  var r = await sbQ(sb.from('hearings').insert({
    matter_id: mid,
    hearing_date: date,
    hearing_type: $('#hType').value,
    duration_min: parseInt($('#hDuration').value)||60,
    is_deadline: $('#hDeadline').checked,
    preparation_notes: $('#hNotes').value.trim() || null
  }));
  if(r.error){ toast('שגיאה: '+r.error.message, 'error'); return; }
  closeModal();
  await loadHearings(); updateNavCounts(); render();
  toast('דיון נשמר', 'success');
}

function openTimeForm(matterId){
  var html = '';
  html += '<div class="form-row cols-2">';
  html += '  <div class="field"><label>תיק</label><select id="tMatter">';
  state.matters.forEach(function(m){ html += '<option value="'+m.id+'" '+(m.id===matterId?'selected':'')+'>'+escapeHtml(m.matter_number)+' · '+escapeHtml(m.title)+'</option>'; });
  html += '  </select></div>';
  html += '  <div class="field"><label>תאריך</label><input type="date" id="tDate" value="'+(new Date().toISOString().slice(0,10))+'"></div>';
  html += '</div>';
  html += '<div class="form-row cols-2">';
  html += '  <div class="field"><label>דקות</label><input type="number" id="tMinutes" min="1"></div>';
  html += '  <div class="field"><label>תעריף שעתי</label><input type="number" id="tRate" value="600"></div>';
  html += '</div>';
  html += '<div class="field"><label>תיאור</label><textarea id="tDesc" placeholder="מה נעשה בזמן זה..."></textarea></div>';

  html += '<div class="flex" style="margin-top:16px;justify-content:flex-end;gap:8px"><button class="btn" onclick="closeModal()">ביטול</button><button class="btn primary" onclick="saveTime()">שמור</button></div>';
  showModal({ title: 'רישום שעות עבודה', html: html });
}

async function saveTime(){
  var mid = $('#tMatter').value;
  var minutes = parseInt($('#tMinutes').value);
  var desc = $('#tDesc').value.trim();
  if(!mid || !minutes || !desc){ toast('תיק, דקות, ותיאור הם שדות חובה', 'error'); return; }
  if(!sb){ toast('מצב הדגמה', 'error'); closeModal(); return; }
  var r = await sbQ(sb.from('time_entries').insert({
    matter_id: mid,
    entry_date: $('#tDate').value,
    minutes: minutes,
    description: desc,
    rate_per_hour: parseFloat($('#tRate').value) || 0,
    billable: $('#tBillable').checked
  }));
  if(r.error){ toast('שגיאה: '+r.error.message, 'error'); return; }
  closeModal();
  await loadTimeEntries(); render();
  toast('רישום שעות נשמר', 'success');
}
